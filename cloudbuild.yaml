# cloudbuild.yaml - Pipeline CI/CD para FlyTrack Backend
steps:
  # ===== 1. Compilación y Pruebas Unitarias =====
  - name: 'maven:3.9-eclipse-temurin-21'
    id: build-and-test
    entrypoint: 'mvn'
    args: ['clean', 'verify', '-B']

  # ===== 2. Configurar Docker para Artifact Registry =====
  - name: 'gcr.io/cloud-builders/gcloud'
    id: configure-docker
    entrypoint: 'gcloud'
    args:
      - 'auth'
      - 'configure-docker'
      - '${_REGION}-docker.pkg.dev'
      - '--quiet'

  # ===== 3. Build de Imagen Docker =====
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    args:
      - 'build'
      - '-t'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--pull'
      - '.'
    waitFor: ['build-and-test', 'configure-docker']

  # ===== 4. Push a Artifact Registry =====
  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args:
      - 'push'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
    waitFor: ['build-image']

  # ===== 5. Tag 'latest' para caché futuro =====
  - name: 'gcr.io/cloud-builders/docker'
    id: tag-latest
    args:
      - 'tag'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:latest'
    waitFor: ['push-image']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    args:
      - 'push'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:latest'
    waitFor: ['tag-latest']

  # ===== 6. Despliegue a Cloud Run =====
  - name: 'gcr.io/cloud-builders/gcloud'
    id: deploy-cloud-run
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--port=8080'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=SPRING_PROFILES_ACTIVE=prod,SPRING_DATASOURCE_URL=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres,SPRING_DATASOURCE_USERNAME=postgres.bajdizxoykudmiuscebu,SPRING_MAIL_USERNAME=flytrack8@gmail.com,APP_MAIL_FROM=flytrack8@gmail.com'
      - '--set-secrets=SPRING_DATASOURCE_PASSWORD=flytrack-db-password:latest,BREVO_API_KEY=flytrack-brevo-api-key:latest,SPRING_MAIL_PASSWORD=flytrack-mail-password:latest,APP_JWT_SECRET=flytrack-jwt-secret:latest'
      - '--update-labels=app=flytrack,env=prod,commit-sha=${SHORT_SHA},deployed-by=cloud-build'
    waitFor: ['push-latest']

  # ===== 7. Verificación de Salud =====
  - name: 'gcr.io/cloud-builders/gcloud'
    id: verify-deployment
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$(gcloud run services describe ${_SERVICE_NAME} --region=${_REGION} --format='value(status.url)')
        echo "🔗 Service URL: $$SERVICE_URL"
        for i in {1..30}; do
          if curl -sf "$$SERVICE_URL/actuator/health" | jq -e '.status == "UP"' > /dev/null; then
            echo "✅ Service is healthy"
            exit 0
          fi
          echo "⏳ Waiting... ($$i/30)"
          sleep 10
        done
        echo "❌ Failed to become healthy"
        exit 1
    waitFor: ['deploy-cloud-run']

# ===== Variables =====
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: flytrack-backend
  _ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/flytrack-494515/flytrack-images

# ===== Opciones =====
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
